<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" width="720" height="220">
  <title>Sniplo Logo — Monochrome Light (for dark backgrounds)</title>
  <defs>
    <style type="text/css">
      <![CDATA[
        .wordmark { font-family: "Plus Jakarta Sans", "Poppins", "Inter", system-ui, -apple-system, sans-serif; font-weight: 700; letter-spacing: -3px; }
        .tagline { font-family: "Plus Jakarta Sans", "Poppins", "Inter", system-ui, -apple-system, sans-serif; font-weight: 500; letter-spacing: 0; }
      ]]>
    </style>
  </defs>

  <g transform="translate(20 20)" fill="#FFFFFF">
