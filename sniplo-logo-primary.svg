<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" width="720" height="220">
  <title>Sniplo Logo — Primary</title>
  <defs>
    <style type="text/css">
      <![CDATA[
        .wordmark { font-family: "Plus Jakarta Sans", "Poppins", "Inter", system-ui, -apple-system, sans-serif; font-weight: 700; letter-spacing: -3px; }
        .tagline { font-family: "Plus Jakarta Sans", "Poppins", "Inter", system-ui, -apple-system, sans-serif; font-weight: 500; letter-spacing: 0; }
      ]]>
    </style>
  </defs>

  <!-- Mark, scaled to 180px -->
  <g transform="translate(20 20)">
    <!-- Blue C -->
    <path d="M84.4 42.2 H56.2 a47.8 47.8 0 0 0 0 95.6 H84.4 V101.3 H61.9 a11.3 11.3 0 0 1 0 -22.5 H84.4 Z" fill="#4F8CFF"/>
    <!-- Violet D -->
    <path d="M95.7 42.2 H123.9 a47.8 47.8 0 0 1 0 95.6 H95.7 Z" fill="#7C5CFF"/>
    <!-- Cursor burst -->
    <g stroke="#7C5CFF" stroke-width="8.4" stroke-linecap="round" fill="none">
      <path d="M149 70 l19.7 -5.6"/>
      <path d="M151.8 89.7 l19.7 2.8"/>
      <path d="M146.3 109.4 l18.3 11.3"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="220" y="138" class="wordmark" font-size="110" fill="#0F172A">Sniplo</text>

  <!-- Tagline -->
  <text x="222" y="178" class="tagline" font-size="22" fill="#64748B">Type less. Do more.</text>
</svg>
